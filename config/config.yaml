data:
  # Extended timeline to capture 2022 Inflation Crash & 2023-2024 Recovery
  start_date: "2015-01-01"
  end_date: "2024-12-31"

  # Split point: Agent learns on Covid (2020), tested on Inflation + Recovery (2021-2024)
  train_end_date: "2020-12-31"
  test_start_date: "2021-01-01"

  ticker_list:
    # --- Tech (Growth / High Volatility) ---
    - "AAPL" # Apple: Market leader in consumer electronics
    - "MSFT" # Microsoft: Leading software and cloud services provider
    - "NVDA" # NVIDIA: Leader in GPUs and AI hardware

    # --- Financials (Interest Rate Sensitive) ---
    - "JPM" # JPMorgan Chase: Largest US bank, benefits from rising rates
    - "GS" # Goldman Sachs: Leading global investment bank

    # --- Healthcare (Defensive) ---
    - "JNJ" # Johnson & Johnson: Diversified healthcare giant
    - "PFE" # Pfizer: Major pharmaceutical company

    # --- Consumer Staples (Low Volatility) ---
    - "WMT" # Walmart: Leading retailer with stable demand
    - "KO" # Coca-Cola: Major beverage company with consistent revenue

    # --- Energy (Inflation Hedge) ---
    - "XOM" # ExxonMobil: Major energy company, often benefits from inflation
    - "CVX" # Chevron: Another major energy player, also benefits from inflation

    # --- Industrials (Macro Cyclical) ---
    - "CAT" # Caterpillar: Industrial bellwether sensitive to economic cycles

    # --- Critical Hedging Assets (Safety) ---
    - "GLD" # Gold: The "Fear" asset (Uncorrelated Store of Value)
    - "TLT" # Bonds: Traditional Hedge (20+ Year Treasury)

  # Sector mapping for each ticker (used for sectoral matrix in graph building)
  sector_map:
    "AAPL": "TECH"
    "MSFT": "TECH"
    "NVDA": "TECH"
    "JPM": "FIN"
    "GS": "FIN"
    "JNJ": "HLTH"
    "PFE": "HLTH"
    "WMT": "CONS"
    "KO": "CONS"
    "XOM": "ENRG"
    "CVX": "ENRG"
    "CAT": "IND"
    "GLD": "COMM"
    "TLT": "BOND"

preprocessing:
  normalisation_window: 63 # 3 months rolling window for normalisation
  use_technical_indicator: true
  tech_indicator_list:
    - "macd"
    - "rsi"
    - "cci"
    - "dx"
    - "boll_ub"
    - "boll_lb"

graph:
  lookback_window: 63 # ~2 months. Faster response to sudden crashes (e.g., Covid).
  sparsity_method: "threshold" # Options: 'threshold' or 'knn'
  threshold: 0.2 # Correlation threshold for edge creation
  top_k: 4 # Top-k connections per node (if using knn method)

env:
  initial_amount: 1000000
  transaction_cost_pct: 0.001 # 0.1% cost per trade
  reward_scaling: 1.0 # Keep standard scaling
  hmax: 500 # Max shares per trade (Legacy parameter)
  turbulence_threshold: null # Set to null to force agent to trade through crashes (Stress Test)
  max_sector_weight: 0.40 # Limit each sector to 40% max (prevents concentration)

ppo:
  learning_rate: 0.00008 # REDUCED: Risk-aware reward needs more conservative learning
  n_steps: 2048 # Standard rollout buffer size
  batch_size: 64
  gamma: 0.99 # Discount factor
  gae_lambda: 0.95
  clip_range: 0.2
  ent_coef: 0.01 # Encourage more exploration with new reward structure
  total_timesteps: 300000 # 33% more steps for better convergence with risk penalties
  eval_freq: 5000
  best_model_path: "./models/best_model/"
  log_path: "./results/eval_logs/"

gat:
  n_hidden: 32
  n_heads: 4
  dropout: 0.2
  alpha: 0.2
  threshold: 0.5 # Graph sparsity threshold (same as price correlation threshold)
  sector_weight: 0.3 # Start at 0.3 to balance correlation+sector adjacency
  # sector_weight will be sigmoid'd: 0.3 -> ~0.574 weight on sector, 0.426 on correlation

explainability:
  explainer_epochs: 300 # Higher epochs ensure the edge_mask converges on the minimal subgraph
  learning_rate: 0.005 # Lower LR for better stability when matching 256-dim embeddings

  # Structural Masking thresholds
  mask_threshold: 0.8 # Edges scoring below this are pruned from the minimal subgraph

  # Metric Evaluation settings
  fidelity_type: "cosine" # Cosine Similarity for embeddings
  stability_runs: 5 # Number of iterations to compute the Jaccard Similarity index
